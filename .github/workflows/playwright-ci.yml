name: Playwright CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy-pages:
    needs: test
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Download Playwright artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: playwright-${{ github.run_id }}
          path: ./artifact

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload HTML report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./artifact/playwright-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

